services:
  - type: web
    name: iutede-backend
    env: python
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iutede-db
          property: connectionString

databases:
  - name: iutede-db
    databaseName: iutede_db
    user: iutede_user
